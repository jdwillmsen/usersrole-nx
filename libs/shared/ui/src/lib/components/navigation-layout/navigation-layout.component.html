<mat-sidenav-container autosize data-cy="sidenav-container">
  @if (isSideNavEnabled) {
    <mat-sidenav
      (openedChange)="openedChanged($event)"
      [mode]="sideNavMode"
      [opened]="isSideNavOpened"
      role="navigation"
      data-cy="sidenav"
    >
      <div class="side-nav-container">
        <mat-nav-list data-cy="nav-list">
          @for (item of navigationItems; track item) {
            <usersrole-nx-navigation-item
              [attr.data-cy]="item.title.toLowerCase() + '-navigation-item'"
              [navigationItem]="item"
              [isExpanded]="sideNavMode === 'side' ? isExpanded : true"
            />
          }
        </mat-nav-list>
        @if (sideNavMode === 'side') {
          <button
            (click)="toggleSideNav()"
            [matTooltip]="isExpanded ? 'Toggle Collapse' : 'Toggle Expand'"
            class="expand"
            data-cy="expand-toggle-button"
            mat-icon-button
          >
            @if (!isExpanded) {
              <mat-icon data-cy="expand-icon">
                keyboard_double_arrow_right
              </mat-icon>
            }
            @if (isExpanded) {
              <mat-icon data-cy="collapse-icon">
                keyboard_double_arrow_left
              </mat-icon>
            }
          </button>
        }
      </div>
    </mat-sidenav>
  }
  <mat-sidenav-content data-cy="sidenav-content">
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
